<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath fill='%23d9bd8a' d='M32 2 38 26 62 32 38 38 32 62 26 38 2 32 26 26Z'/%3E%3C/svg%3E">
  <title>404 · Laxman Kanagaratnam</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0d14;
      --text: #d6d9e0;
      --text-dim: #8a8f9e;
      --accent: #d9bd8a;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #faf8f3;
        --text: #33383f;
        --text-dim: #767c87;
        --accent: #8a6420;
      }
    }
    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      line-height: 1.7;
    }
    .glyph { color: var(--accent); font-size: 1.4rem; }
    h1 { font-size: 3rem; font-weight: normal; margin: 0.5rem 0; }
    p { color: var(--text-dim); max-width: 26rem; margin: 0 auto 1.5rem; }
    a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; }
    a:hover { border-bottom-color: var(--accent); }
  </style>
</head>
<body>
  <div>
    <div class="glyph">✦</div>
    <h1>404</h1>
    <p>This page has drifted beyond the observable universe.</p>
    <a href="/">Return home</a>
  </div>
</body>
</html>
